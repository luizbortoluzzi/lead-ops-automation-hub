# Serves the built SPA and reverse-proxies the API to the backend, so the
# browser is always same-origin (no CORS) and the backend URL is never baked
# into the client bundle.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API + health → backend service on the compose network.
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /health {
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
    }
}
