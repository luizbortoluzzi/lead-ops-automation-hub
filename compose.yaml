# ---------------------------------------------------------------------------
# LeadOps Automation Hub — Phase 2 local stack.
# Bring everything up with: docker compose up --build -d
# ---------------------------------------------------------------------------

name: leadops

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: ${TZ}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Schema is managed by TypeORM migrations (run by the backend on startup).
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      BACKEND_PORT: 3000
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${POSTGRES_DB}
      DATABASE_USER: ${POSTGRES_USER}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      BACKEND_API_KEY: ${BACKEND_API_KEY}
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      SMTP_FROM: ${SMTP_FROM:-leadops@example.local}
      SALES_NOTIFICATION_EMAIL: ${SALES_NOTIFICATION_EMAIL:-sales@example.local}
      TZ: ${TZ}
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # Node ships fetch; exit non-zero unless /health returns 2xx.
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      backend:
        condition: service_healthy

  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    environment:
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      # Local development only. Do NOT use these settings in production.
      N8N_SECURE_COOKIE: "false"
      N8N_RUNNERS_ENABLED: "true"
      GENERIC_TIMEZONE: ${TZ}
      TZ: ${TZ}
    ports:
      - "${N8N_PORT:-5678}:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      backend:
        condition: service_healthy
      mailpit:
        condition: service_started

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    environment:
      TZ: ${TZ}
      # Local dev: no auth, accept any sender/recipient.
      MP_SMTP_AUTH_ALLOW_INSECURE: "true"
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025" # SMTP
      - "${MAILPIT_WEB_PORT:-8025}:8025" # Web UI
    volumes:
      - mailpit_data:/data

volumes:
  postgres_data:
  n8n_data:
  mailpit_data:
